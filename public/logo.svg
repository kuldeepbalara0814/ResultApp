<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- डार्क थीम बैकग्राउंड -->
  <rect width="512" height="512" rx="120" fill="#0f172a"/>
  
  <!-- टील कलर का ग्लोइंग बॉर्डर -->
  <rect x="40" y="40" width="432" height="432" rx="88" fill="none" stroke="#2dd4bf" stroke-width="16" stroke-opacity="0.3"/>
  
  <!-- SM (Sahil Master) लेटर -->
  <text x="256" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="200" font-weight="800" fill="#2dd4bf" text-anchor="middle">SM</text>
  
  <!-- नीचे का टेक्स्ट -->
  <text x="256" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="45" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="8">MASTER</text>
</svg>

