<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- डार्क प्रीमियम बैकग्राउंड -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051014" />
      <stop offset="100%" stop-color="#0b171e" />
    </linearGradient>
    
    <!-- SM के लिए शानदार मैजेंटा-टील मिक्स ग्रेडिएंट -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d94" />
      <stop offset="50%" stop-color="#e6007a" />
      <stop offset="100%" stop-color="#00e6e6" />
    </linearGradient>

    <!-- हल्का ग्लो इफ़ेक्ट -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- मुख्य बैकग्राउंड -->
  <rect width="200" height="200" rx="45" fill="url(#bg)" />

  <!-- आउटर टील बॉर्डर (हल्का) -->
  <rect x="8" y="8" width="184" height="184" rx="38" fill="none" stroke="#008080" stroke-width="1.5" opacity="0.5"/>
  
  <!-- इनर मैजेंटा बॉर्डर (तेज चमक) -->
  <rect x="16" y="16" width="168" height="168" rx="32" fill="none" stroke="#e6007a" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>

  <!-- स्टाइलिश और रॉयल 'SM' फॉन्ट -->
  <text x="100" y="118" font-family="'Georgia', 'Times New Roman', serif" font-style="italic" font-weight="bold" font-size="85" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">SM</text>

  <!-- MASTER के लिए साफ़ और मॉडर्न फॉन्ट -->
  <text x="102" y="158" font-family="'Trebuchet MS', 'Montserrat', sans-serif" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="8" opacity="0.9">MASTER</text>
  
  <!-- डिज़ाइनर डॉट्स -->
  <circle cx="35" cy="153" r="2.5" fill="#e6007a" filter="url(#glow)"/>
  <circle cx="168" cy="153" r="2.5" fill="#00e6e6" filter="url(#glow)"/>
</svg>
